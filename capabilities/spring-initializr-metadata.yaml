naftiko: 1.0.0-alpha2
info:
  label: Spring Initializr API — Metadata
  description: 'Spring Initializr API — Metadata. 2 operations. Lead operation: Get Initializr Metadata. Self-contained Naftiko
    capability covering one Spring Framework business surface.'
  tags:
  - Spring Framework
  - Metadata
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPRING_FRAMEWORK_API_KEY: SPRING_FRAMEWORK_API_KEY
capability:
  consumes:
  - type: http
    namespace: spring-initializr-metadata
    baseUri: https://start.spring.io
    description: Spring Initializr API — Metadata business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: getmetadata
        method: GET
        description: Get Initializr Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
          description: Use application/vnd.initializr.v2.2+json for structured metadata, or text/html to get the web UI
    - name: dependencies
      path: /dependencies
      operations:
      - name: getdependencies
        method: GET
        description: Get Available Dependencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bootVersion
          in: query
          type: string
          description: Filter dependencies compatible with this Spring Boot version
  exposes:
  - type: rest
    namespace: spring-initializr-metadata-rest
    port: 8080
    description: REST adapter for Spring Initializr API — Metadata. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: GET
        name: getmetadata
        description: Get Initializr Metadata
        call: spring-initializr-metadata.getmetadata
        with:
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dependencies
      name: dependencies
      description: REST surface for dependencies.
      operations:
      - method: GET
        name: getdependencies
        description: Get Available Dependencies
        call: spring-initializr-metadata.getdependencies
        with:
          bootVersion: rest.bootVersion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spring-initializr-metadata-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spring Initializr API — Metadata. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-initializr-metadata
      description: Get Initializr Metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spring-initializr-metadata.getmetadata
      with:
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: get-available-dependencies
      description: Get Available Dependencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spring-initializr-metadata.getdependencies
      with:
        bootVersion: tools.bootVersion
      outputParameters:
      - type: object
        mapping: $.
